<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>まいどはやバス 行路表示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Oswald:wght@600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #2a3550;
    --accent: #ffb300;
    --accent2: #ff6b35;
    --green: #00e676;
    --yellow: #ffeb3b;
    --red: #ff4444;
    --text: #e8edf5;
    --muted: #6b7a99;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'BIZ UDPGothic',sans-serif; min-height:100dvh; overflow-x:hidden; }

  #selector { display:flex; flex-direction:column; min-height:100dvh; padding:20px 16px 30px; }
  .app-title { text-align:center; margin-bottom:24px; }
  .app-title h1 { font-size:1.3rem; font-weight:700; color:var(--accent); letter-spacing:0.05em; }
  .app-title p  { font-size:0.75rem; color:var(--muted); margin-top:4px; }

  .sel-label { font-size:0.72rem; font-weight:700; letter-spacing:0.12em; color:var(--muted); margin-bottom:8px; margin-top:20px; }

  .two-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .sel-btn {
    background:var(--surface); border:2px solid var(--border); border-radius:12px;
    padding:16px 10px; color:var(--text); font-family:'BIZ UDPGothic',sans-serif;
    font-size:1rem; font-weight:700; text-align:center; cursor:pointer; line-height:1.5;
  }
  .sel-btn:active, .sel-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }
  .sel-btn .badge { display:block; font-size:0.65rem; font-weight:400; margin-top:4px; opacity:0.7; }

  .dep-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dep-btn {
    background:var(--surface); border:2px solid var(--border); border-radius:12px;
    padding:16px 10px; color:var(--text); font-family:'BIZ UDPGothic',sans-serif;
    font-size:1.1rem; font-weight:700; text-align:center; cursor:pointer;
  }
  .dep-btn:active, .dep-btn.active { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .dep-btn small { display:block; font-size:0.65rem; margin-top:4px; opacity:0.7; }

  .hour-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .hour-btn {
    background:var(--surface); border:2px solid var(--border); border-radius:8px;
    padding:12px 4px; color:var(--text); font-family:'Oswald',sans-serif;
    font-size:1.2rem; font-weight:700; text-align:center; cursor:pointer;
  }
  .hour-btn:active, .hour-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }

  .start-btn {
    background:var(--green); border:none; border-radius:14px; padding:16px;
    font-family:'BIZ UDPGothic',sans-serif; font-size:1.1rem; font-weight:700;
    color:#000; cursor:pointer; margin-top:28px; letter-spacing:0.05em;
  }
  .start-btn:disabled { background:var(--border); color:var(--muted); }

  .warn-note {
    background:rgba(255,179,0,0.1); border:1px solid var(--accent);
    border-radius:8px; padding:10px 12px; margin-top:16px;
    font-size:0.75rem; color:var(--accent); line-height:1.6;
  }

  /* 運行画面 */
  #run-screen { display:none; flex-direction:column; min-height:100dvh; }

  #header {
    position:sticky; top:0; z-index:100;
    background:var(--surface); border-bottom:2px solid var(--border);
    padding:10px 16px 8px;
  }
  .route-line { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .route-badge { background:var(--accent); color:#000; font-family:'Oswald',sans-serif; font-size:1rem; font-weight:700; padding:2px 10px; border-radius:4px; }
  .route-name { font-size:0.9rem; font-weight:700; flex:1; }
  .status-bar { display:flex; justify-content:space-between; align-items:center; }
  .clock { font-family:'Oswald',sans-serif; font-size:2.6rem; font-weight:700; color:var(--accent); letter-spacing:0.05em; line-height:1; }
  .delay-badge { font-size:1.4rem; font-weight:700; padding:3px 10px; border-radius:20px; border:2px solid; }
  .d-ok   { color:var(--green);  border-color:var(--green); }
  .d-warn { color:var(--yellow); border-color:var(--yellow); }
  .d-late { color:var(--red);    border-color:var(--red); }

  .gps-bar {
    display:flex; align-items:center; gap:6px; padding:4px 16px;
    background:#0d1422; font-size:0.7rem; color:var(--muted);
    border-bottom:1px solid var(--border);
  }
  .gps-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
  .gps-dot.searching { background:var(--yellow); animation:blink 0.5s infinite; }
  .gps-dot.off { background:var(--red); animation:none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* GPS接近通知バナー：ヘッダー直下に固定 */
  #approach-banner {
    display:none;
    position:sticky; top:0; z-index:95;
    background:var(--green); color:#000;
    text-align:center; padding:12px;
    font-weight:700; font-size:1.5rem;
    animation:flash 0.8s infinite;
  }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.6} }

  #stop-list { padding:8px 0 30px; }
  .stop-item {
    display:flex; align-items:stretch; padding:0 16px; min-height:62px;
    border-bottom:1px solid var(--border); transition:background 0.3s;
  }
  .stop-item.passed      { display:none; }
  .stop-item.passed.last { display:flex; opacity:0.45; }
  .stop-item.current { background:rgba(255,179,0,0.1); border-left:4px solid var(--accent); }
  .stop-item.next    { background:rgba(255,107,53,0.35); border-left:4px solid var(--accent2); }

  .timeline { display:flex; flex-direction:column; align-items:center; width:28px; padding:0 4px; flex-shrink:0; }
  .tl-top { width:2px; flex:1; background:var(--border); }
  .tl-dot { width:11px; height:11px; border-radius:50%; border:2px solid var(--border); background:var(--bg); flex-shrink:0; }
  .stop-item.passed  .tl-dot { background:#2a3550; border-color:#3d4f6e; }
  .stop-item.current .tl-dot { background:var(--accent); border-color:var(--accent); box-shadow:0 0 8px var(--accent); }
  .stop-item.next    .tl-dot { background:var(--accent2); border-color:var(--accent2); }
  .tl-bot { width:2px; flex:1; background:var(--border); }

  .stop-content { flex:1; display:flex; align-items:center; justify-content:space-between; padding:8px 0 8px 8px; }
  .stop-info { flex:1; }
  .stop-num  { font-size:0.62rem; color:var(--muted); margin-bottom:2px; }
  .stop-name { font-size:1.2rem; font-weight:700; line-height:1.2; }
  .stop-item.passed  .stop-name { color:#3d4f6e; }
  .stop-item.current .stop-name { color:var(--accent); font-size:1.6rem; }
  .stop-item.next    .stop-name { color:#fff; font-size:1.6rem; }
  .stop-item.upcoming .stop-name { font-size:1.2rem; }
  .stop-dist { font-size:0.7rem; color:var(--muted); margin-top:2px; }

  .time-block { text-align:right; flex-shrink:0; }
  .sched-time { font-family:'Oswald',sans-serif; font-size:1.55rem; font-weight:700; line-height:1; }
  .stop-item.passed  .sched-time { color:#3d4f6e; }
  .stop-item.current .sched-time { color:var(--accent); font-size:2.2rem; }
  .stop-item.next    .sched-time { color:var(--accent2); font-size:2.2rem; }
  .diff-time { font-size:1rem; font-weight:700; text-align:right; margin-top:2px; }
  .d-e { color:var(--red); } .d-o { color:var(--muted); } .d-l { color:var(--muted); }

  .back-btn {
    position:fixed; top:14px; right:16px; z-index:400;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); font-size:0.72rem; padding:5px 10px;
    border-radius:6px; cursor:pointer; font-family:'BIZ UDPGothic',sans-serif;
  }

  /* 手動送りボタン */
  .manual-btn {
    position:fixed; bottom:70px; right:16px; z-index:300;
    background:var(--surface2); border:2px solid var(--border);
    color:var(--muted); font-size:0.72rem; padding:8px 12px;
    border-radius:8px; cursor:pointer; font-family:'BIZ UDPGothic',sans-serif;
  }
</style>
</head>
<body>

<!-- 便選択画面 -->
<div id="selector">
  <div class="app-title">
    <h1>🚌 まいどはやバス</h1>
    <p>行路時刻表示システム</p>
  </div>

  <div class="sel-label">① ルート選択</div>
  <div class="two-btns">
    <button class="sel-btn" onclick="selectRoute('west', this)">
      西ルート<span class="badge">富山駅前 → 循環</span>
    </button>
    <button class="sel-btn" onclick="selectRoute('east', this)">
      東ルート<span class="badge">富山駅前 → 循環</span>
    </button>
  </div>

  <div id="dep-section" style="display:none;">
    <div class="sel-label">② 発車時刻</div>
    <div class="dep-btns">
      <button class="dep-btn" onclick="selectDep(0, this)">〇〇:00 発<small>毎時00分発</small></button>
      <button class="dep-btn" onclick="selectDep(30, this)">〇〇:30 発<small>毎時30分発</small></button>
    </div>
  </div>

  <div id="hour-section" style="display:none;">
    <div class="sel-label">③ 時刻（何時？）</div>
    <div class="hour-grid" id="hour-grid"></div>
  </div>

  <div class="warn-note">
    ※ 19時台は19:00発のみ（19:30発は運行なし）<br>
    ※ 年中休まず運行
  </div>

  <button class="start-btn" id="start-btn" onclick="startRun()" disabled>
    ▶ この便を表示する
  </button>
</div>

<!-- 運行画面 -->
<div id="run-screen">
  <div id="header">
    <div class="route-line">
      <span class="route-badge" id="rte-badge">系統</span>

    <div class="status-bar">

    </div>
  </div>
  <div class="gps-bar">
    <div class="gps-dot searching" id="gps-dot"></div>
    <span id="gps-text">GPS取得中...</span>
  </div>
  <div id="approach-banner">🚏 バス停に接近しています</div>
  <div id="stop-list"></div>
  <button class="manual-btn" onclick="manualAdvance()">手動 ▶</button>
  <button class="back-btn" onclick="goBack()">◀ 便選択</button>
</div>

// ===================================================
// 1. ユーティリティ
// ===================================================
function pad(n) { return String(n).padStart(2,'0'); }
function timeToSec(t) {
  if (!t) return null;
  var p = t.split(':');
  return Number(p[0]) * 3600 + Number(p[1]) * 60;
}
function nowSec() {
  var n = new Date();
  return n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
}

// 2点間の距離（メートル）
function calcDist(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// スリープ防止（透明動画ループ方式）
function requestWakeLock() {
  try {
    var video = document.createElement('video');
    video.setAttribute('playsinline', '');
    video.setAttribute('muted', '');
    video.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';

// ===================================================
// 5. 選択ロジック
// ===================================================
function selectRoute(key, btn) {
  selectedRoute = key; selectedDepMin = null; selectedHour = null;
  document.querySelectorAll('.sel-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('dep-section').style.display = 'block';
  document.querySelectorAll('.dep-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('hour-section').style.display = 'none';
  document.getElementById('start-btn').disabled = true;
}

function selectDep(min, btn) {
  selectedDepMin = min; selectedHour = null;
  document.querySelectorAll('.dep-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var grid = document.getElementById('hour-grid');
  grid.innerHTML = '';
  var hours = min === 0 ? HOURS_00 : HOURS_30;
  hours.forEach(function(h) {
    var b = document.createElement('button');
    b.className = 'hour-btn';
    b.textContent = h + '時';
    b.onclick = (function(hh, el){ return function(){ selectHour(hh, el); }; })(h, b);
    grid.appendChild(b);
  });
  document.getElementById('hour-section').style.display = 'block';
  document.getElementById('start-btn').disabled = true;
}

function selectHour(h, btn) {
  selectedHour = h;
  document.querySelectorAll('.hour-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('start-btn').disabled = false;
}

// ===================================================
// 6. 時刻＋座標データ生成
// ===================================================
function buildActiveStops() {
  var geo     = selectedRoute === 'west' ? WEST_GEO    : EAST_GEO;
  var offsets = selectedRoute === 'west' ? WEST_OFFSET : EAST_OFFSET;
  var baseMin = selectedHour * 60 + selectedDepMin;
  var result  = [];
  var geoResult = [];

  for (var i = 0; i < geo.length; i++) {
    var absMin = baseMin + offsets[i];
    var h = Math.floor(absMin / 60);
    var m = absMin % 60;
    result.push({ name: geo[i].name, time: pad(h)+':'+pad(m) });
    geoResult.push({ lat: geo[i].lat, lon: geo[i].lon });
  }
  return { stops: result, geo: geoResult };
}

// ===================================================
// 7. 運行開始
// ===================================================
function startRun() {
  var data = buildActiveStops();
  activeStops = data.stops;
  activeGeo   = data.geo;
  currentStopIdx = 0;
  approachShown  = false;

  var routeLabel = selectedRoute === 'west' ? '西ルート' : '東ルート';
  document.getElementById('rte-badge').textContent = routeLabel;
  document.getElementById('rte-name').textContent = 'まいどはやバス　' + selectedHour + ':' + pad(selectedDepMin) + '発';

  document.getElementById('selector').style.display = 'none';
  var rs = document.getElementById('run-screen');
  rs.style.display = 'flex'; rs.style.flexDirection = 'column';

  renderStops();
  startClock();
  initGPS();
  requestWakeLock();
}

function goBack() {
  document.getElementById('run-screen').style.display = 'none';
  document.getElementById('selector').style.display = 'flex';
  clearInterval(clockTimer);
  if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (wakeLock !== null) { wakeLock = null; }
}

function manualAdvance() {
  if (currentStopIdx < activeStops.length - 1) {
    currentStopIdx++;
    approachShown = false;
    document.getElementById('approach-banner').style.display = 'none';
    renderStops();
  }
}

// ===================================================
// 8. GPS自動検知
// ===================================================
function initGPS() {
  var dot = document.getElementById('gps-dot');
  var txt = document.getElementById('gps-text');
  if (!navigator.geolocation) {
    dot.className = 'gps-dot off'; txt.textContent = 'GPS非対応'; return;
  }
  gpsWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      dot.className = 'gps-dot';
      txt.textContent = 'GPS取得済  ±' + Math.round(pos.coords.accuracy) + 'm';
      checkApproach();
      updateDistances();
    },
    function(err) {
      dot.className = 'gps-dot off';
      if (err.message && err.message.indexOf('permissions policy') !== -1) {
        txt.textContent = 'GPS：プレビュー環境では無効（実機では動作します）';
      } else if (err.code === 1) {
        txt.textContent = 'GPS：位置情報の許可が必要です';
      } else {
        txt.textContent = 'GPS取得失敗';
      }
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

function checkApproach() {
  if (currentLat === null || currentStopIdx >= activeStops.length) return;

  // 現在停留所との距離
  var curGeo  = activeGeo[currentStopIdx];
  var distCur = calcDist(currentLat, currentLon, curGeo.lat, curGeo.lon);

  // 次停留所との距離
  var nextIdx = currentStopIdx + 1;
  if (nextIdx >= activeStops.length) return;
  var nextGeo  = activeGeo[nextIdx];
  var distNext = calcDist(currentLat, currentLon, nextGeo.lat, nextGeo.lon);

  // 次のバス停に50m以内 かつ 現在停留所より近い → 自動進める
  if (distNext < GPS_THRESHOLD && distNext < distCur) {
    currentStopIdx++;
    approachShown = false;
    document.getElementById('approach-banner').style.display = 'none';
    renderStops();
    return;
  }

  // 次のバス停に150m以内 → 接近バナー表示
  var banner = document.getElementById('approach-banner');
  if (distNext < 150) {
    banner.textContent = '🚏 まもなく ' + activeStops[nextIdx].name + '（' + Math.round(distNext) + 'm）';
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

function updateDistances() {
  if (currentLat === null) return;
  // 現在・次停留所の距離表示を更新
  [currentStopIdx, currentStopIdx+1].forEach(function(i) {
    if (i >= activeStops.length) return;
    var el = document.getElementById('dist-' + i);
    if (!el) return;
    var d = calcDist(currentLat, currentLon, activeGeo[i].lat, activeGeo[i].lon);
    el.textContent = Math.round(d) + 'm';
  });
}

// ===================================================
// 9. レンダリング
// ===================================================
function diffLabel(schedSec) {
  var d = nowSec() - schedSec; // 秒単位
  if (d < 0)    return { cls:'d-e', text: Math.ceil(-d/60) + '分早' };
  if (d < 60)   return { cls:'d-o', text: '定刻' };
  return { cls:'d-l', text: Math.floor(d/60) + '分遅' };
}

function renderStops() {
  var list = document.getElementById('stop-list');
  list.innerHTML = '';
  activeStops.forEach(function(stop, i) {
    var div = document.createElement('div');
    div.className = 'stop-item';
    div.id = 's' + i;
    var isPassed  = i < currentStopIdx;
    var isLast    = i === currentStopIdx - 1; // 1つ前だけ残す
    var isCurrent = i === currentStopIdx;
    var isNext    = i === currentStopIdx + 1;
    if (isPassed)  div.classList.add('passed');
    if (isLast)    div.classList.add('last');
    if (isCurrent) div.classList.add('current');
    if (isNext)    div.classList.add('next');

    var schedSec = timeToSec(stop.time);
    var diff = (schedSec && isCurrent) ? diffLabel(schedSec) : null;
    var showDist = (isCurrent || isNext);

    div.innerHTML =
      '<div class="timeline"><div class="tl-top"></div><div class="tl-dot"></div><div class="tl-bot"></div></div>' +
      '<div class="stop-content">' +
        '<div class="stop-info">' +
          '<div class="stop-num">' + (i+1) + ' / ' + activeStops.length + '</div>' +
          '<div class="stop-name">' + stop.name + '</div>' +
          (showDist ? '<div class="stop-dist" id="dist-' + i + '">---m</div>' : '') +
        '</div>' +
        '<div class="time-block">' +
          '<div class="sched-time">' + stop.time + '</div>' +
          (diff ? '<div class="diff-time ' + diff.cls + '">' + diff.text + '</div>' : '') +
        '</div>' +
      '</div>';

    if (isCurrent) {
      div.addEventListener('click', function() { manualAdvance(); });
      div.style.cursor = 'pointer';
    }
    list.appendChild(div);
  });

  updateFloat();
  updateDelay();
  if (currentLat !== null) updateDistances();
  var el = document.getElementById('s' + currentStopIdx);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
}

function updateFloat() {}

function updateDelay() {
  var cur = activeStops[currentStopIdx];
  if (!cur) return;
  var d = nowSec() - timeToSec(cur.time); // 秒単位
  var badge = document.getElementById('delay-badge');
  if (d < 0)         { badge.textContent = Math.ceil(-d/60)+'分早発'; badge.className='delay-badge d-late'; }
  else if (d < 60)   { badge.textContent = '定刻';                    badge.className='delay-badge d-ok'; }
  else if (d < 300)  { badge.textContent = Math.floor(d/60)+'分遅延'; badge.className='delay-badge d-ok'; }
  else               { badge.textContent = Math.floor(d/60)+'分遅延'; badge.className='delay-badge d-ok'; }
}

function startClock() {
  function tick() {
    var n = new Date();
    document.getElementById('clock').textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
    updateDelay();
  }
  tick();
  clockTimer = setInterval(tick, 1000);
}
</script>
